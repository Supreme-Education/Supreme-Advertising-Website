# Supreme Advertising — static site + Netlify Functions for /api (admin login & invoicing).

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["better-sqlite3"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/print.html"
  to = "/admin/print.html"
  status = 200

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
